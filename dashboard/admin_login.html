</div>
<main class="flex-grow flex items-center justify-center p-6 relative z-10">
<div class="w-full max-w-[420px] bg-surface-container-lowest rounded-lg shadow-[0px_12px_32px_rgba(230,81,0,0.06)] p-8 md:p-10">
<div class="text-center mb-10">
<div class="flex justify-center mb-6">
<div class="flex justify-center mb-6"><img alt="Divya Darshan Logo" class="h-24 w-auto object-contain" src="../assets/news/logo.png"/></div>
</div>
<p class="font-body text-sm text-on-surface-variant font-medium">Admin Access Portal</p>
</div>
<form class="space-y-5" id="adminLoginForm">
<div class="space-y-1.5">
<label class="font-label text-xs font-semibold text-on-surface-variant ml-1" for="identity">Admin ID / Email</label>
<div class="relative">
<input class="w-full bg-surface-container-low border-transparent focus:border-primary/20 focus:ring-4 focus:ring-primary/5 rounded-lg py-3 px-4 text-on-surface placeholder:text-outline text-sm transition-all" id="identity" name="identity" placeholder="Enter admin credential" type="text" required/>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-outline text-lg" data-icon="admin_panel_settings">admin_panel_settings</span>
</div>
</div>
<div class="space-y-1.5">
<div class="flex justify-between items-center ml-1">
<label class="font-label text-xs font-semibold text-on-surface-variant" for="password">Password</label>
<span class="font-label text-[11px] font-medium text-primary">Use local admin password</span>
</div>
<div class="relative">
<input class="w-full bg-surface-container-low border-transparent focus:border-primary/20 focus:ring-4 focus:ring-primary/5 rounded-lg py-3 px-4 text-on-surface placeholder:text-outline text-sm transition-all" id="password" name="password" placeholder="••••••••" type="password" required/>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-outline text-lg" data-icon="visibility_off">visibility_off</span>
</div>
</div>
<div class="pt-2">
<button class="w-full bg-primary text-on-primary font-manrope font-semibold py-3.5 rounded-lg shadow-sm hover:bg-primary-dim active:scale-[0.98] transition-all flex justify-center items-center gap-2" type="submit">
                        Admin Login
                        <span class="material-symbols-outlined text-lg" data-icon="login">login</span>
</button>
</div>
<div class="relative flex py-3 items-center">
<div class="flex-grow border-t border-surface-container-highest"></div>
<span class="flex-shrink mx-4 text-[11px] font-bold text-outline tracking-widest uppercase">OR</span>
<div class="flex-grow border-t border-surface-container-highest"></div>
</div>
<div class="grid grid-cols-1 gap-3">
<button class="w-full bg-transparent border border-outline-variant/30 text-on-surface-variant font-label text-sm font-semibold py-3 rounded-lg hover:bg-surface-container-low transition-colors flex items-center justify-center gap-2 active:scale-[0.99]" type="button" onclick="window.location.href='index.html'">
                        Return to Public Dashboard
                    </button>
</div>
</form>
<script>
    document.getElementById('adminLoginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const identity = document.getElementById('identity').value.trim().toLowerCase();
        const password = document.getElementById('password').value;
        const adminContextMap = {
            'sdm@gmail.com': 'manjunatha',
            'tirupati@gmail.com': 'tirupati',
            'admin@gmail.com': 'tirupati',
            'localadmin': 'tirupati'
        };

        if (password === '123456789') {
            if (adminContextMap[identity]) {
                sessionStorage.setItem('divyaAdminControlLocal', JSON.stringify({
                    identity,
                    secret: '123456789'
                }));
                localStorage.setItem('adminContext', adminContextMap[identity]);
                window.location.href = '../admin/index.html';
                return;
            }
        }
        
        alert('Invalid local admin credentials. Try one of the local admin IDs with password 123456789.');
    });
</script>
</div>
