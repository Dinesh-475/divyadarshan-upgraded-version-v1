<!-- Shared Nav HTML — paste inside <body> of each page -->
<style>
  .dd-nav{background:rgba(0,0,0,0.55);backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);border-bottom:1px solid rgba(255,255,255,0.07);box-shadow:0 2px 24px rgba(0,0,0,0.25);}
  .dd-drawer{position:fixed;left:0;top:0;bottom:0;width:280px;background:#fff;z-index:100;transform:translateX(-100%);transition:transform 0.3s ease;box-shadow:4px 0 24px rgba(0,0,0,0.12);overflow-y:auto;}
  .dd-drawer.open{transform:translateX(0);}
  .dd-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);backdrop-filter:blur(4px);z-index:99;}
  .dd-overlay.open{display:block;}
  @keyframes ddAiShine{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
  .dd-ai-pill{background:linear-gradient(135deg,#f97316,#ea580c,#f5a623,#ea580c);background-size:300% 300%;animation:ddAiShine 4s ease infinite;}
  body{padding-top:64px;}
</style>
<header class="dd-nav fixed top-0 left-0 right-0 z-50">
  <div class="flex items-center px-4 py-3 gap-3">
    <button onclick="ddToggleDrawer()" class="w-9 h-9 rounded-full flex items-center justify-center hover:bg-white/10 transition-colors">
      <span class="material-symbols-outlined text-white text-xl">menu</span>
    </button>
    <a href="/" class="flex items-center gap-2 flex-shrink-0 group">
      <img src="/assets/news/logo.png" onerror="this.style.display='none'" alt="DD" class="h-10 w-auto object-contain" style="mix-blend-mode:screen;filter:brightness(1.2)"/>
      <div class="hidden sm:block leading-none">
        <p class="text-white font-extrabold text-sm tracking-tight">Divya Darshan</p>
        <p class="text-orange-300/80 text-[9px] font-bold tracking-widest uppercase">Digital Sanctuary</p>
      </div>
    </a>
    <div id="dd-topnav-links" class="flex items-center gap-4 flex-1 ml-4"></div>
    <div class="flex items-center gap-2 flex-shrink-0 ml-auto">
      <a href="/pages/tickets.html" class="dd-ai-pill hidden sm:flex items-center gap-1.5 text-white font-extrabold text-[10px] px-4 py-2 rounded-full shadow-lg hover:-translate-y-0.5 transition-all tracking-wide whitespace-nowrap">
        <span class="material-symbols-outlined text-[14px]" style="font-variation-settings:'FILL' 1">confirmation_number</span> Book Now
      </a>
      <a href="/pages/demo.html" class="hidden sm:flex items-center gap-1.5 bg-white/15 text-white font-bold text-[10px] px-3 py-2 rounded-full hover:bg-white/25 transition-all whitespace-nowrap">Demo</a>
    </div>
  </div>
</header>
<div id="dd-nav-overlay" class="dd-overlay" onclick="ddToggleDrawer()"></div>
<aside id="dd-nav-drawer" class="dd-drawer">
  <div class="p-5">
    <div class="flex items-center justify-between mb-6">
      <div class="flex items-center gap-2">
        <div class="w-8 h-8 rounded-full bg-gradient-to-br from-orange-500 to-red-600 flex items-center justify-center">
          <span class="material-symbols-outlined text-white text-base" style="font-variation-settings:'FILL' 1">temple_hindu</span>
        </div>
        <div>
          <p class="font-extrabold text-[#E65100] text-sm">Divya Darshan</p>
          <p class="text-[10px] text-slate-400">Digital Sanctuary</p>
        </div>
      </div>
      <button onclick="ddToggleDrawer()" class="w-7 h-7 rounded-full hover:bg-slate-100 flex items-center justify-center transition-colors">
        <span class="material-symbols-outlined text-slate-400 text-base">close</span>
      </button>
    </div>
    <nav class="flex flex-col gap-0.5" id="dd-nav-links"></nav>
    <div class="mt-6 pt-5 border-t border-slate-100">
      <a href="/dashboard/registration/register_temple.html" class="flex items-center gap-2 text-sm font-bold text-white bg-gradient-to-r from-orange-500 to-red-600 px-4 py-3 rounded-lg hover:opacity-90 transition-opacity">
        <span class="material-symbols-outlined text-base">temple_hindu</span> Register Your Temple
      </a>
    </div>
  </div>
</aside>
<script>
function ddToggleDrawer(){
  document.getElementById('dd-nav-drawer').classList.toggle('open');
  document.getElementById('dd-nav-overlay').classList.toggle('open');
}
</script>
<script src="/pages/_nav.js"></script>
